name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  host-checks:
    name: Host formatting, lint, and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust host tools
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Cache Cargo dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-host-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-host-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint host-visible code
        run: cargo clippy --lib --target x86_64-unknown-linux-gnu --locked -- -D warnings

      - name: Run host-visible tests
        run: cargo test --lib --target x86_64-unknown-linux-gnu --locked

  firmware-build:
    name: RP2040 release build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust embedded target
        run: rustup toolchain install stable --profile minimal --target thumbv6m-none-eabi

      - name: Cache Cargo dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-rp2040-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rp2040-
            ${{ runner.os }}-cargo-

      - name: Build release firmware
        run: cargo build --release --locked
